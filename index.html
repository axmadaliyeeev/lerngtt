<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MR Group — Цифровые решения</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- CURSOR -->
  <div class="cursor" id="cursor"></div>
  <div class="cursor-follower" id="cursor-follower"></div>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="loader-inner">
      <span class="loader-logo">MR</span>
      <div class="loader-bar"><div class="loader-fill" id="loaderFill"></div></div>
    </div>
  </div>


  <!-- SUCCESS MODAL -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-icon">🚀</div>
      <h3>Заявка отправлена!</h3>
      <p>Мы свяжемся с вами в течение 2 часов. Ожидайте звонка или сообщения в Telegram.</p>
      <button class="btn btn-primary" id="modalClose">Отлично!</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
